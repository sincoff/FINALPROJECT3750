<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship Multiplayer Radar Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="radar-bg">
    <div class="scan-line"></div>
    <div class="vignette"></div>
    <div class="grid-overlay"></div>
  </div>

  <header class="header">
    <h1 class="title"><span class="title-icon">◉</span> BATTLESHIP <span class="title-sub">MULTIPLAYER RADAR COMMAND</span></h1>
    <div class="status-bar"><span class="status-label">STATUS</span> <span id="status" class="status-text">Select server and connect.</span></div>
  </header>

  <main class="app-shell">
    <section class="radar-panel">
      <div class="panel-header"><span class="panel-title">SERVER LINK</span></div>
      <div class="control-row">
        <label for="server-select">Class Server</label>
        <select id="server-select"></select>
      </div>
      <div class="control-row">
        <label for="server-input">Manual URL</label>
        <input id="server-input" type="text" placeholder="https://example.onrender.com" />
      </div>
      <div class="control-row">
        <button id="connect-btn" class="btn-radar">CONNECT</button>
        <span id="server-indicator" class="indicator unknown">?</span>
        <span id="server-indicator-text">Not connected</span>
      </div>
    </section>

    <section id="register-screen" class="radar-panel hidden">
      <div class="panel-header"><span class="panel-title">PLAYER REGISTRATION</span></div>
      <div class="control-row">
        <label for="username-input">Username</label>
        <input id="username-input" type="text" maxlength="32" placeholder="alice" />
      </div>
      <div class="control-row">
        <button id="register-btn" class="btn-radar">REGISTER / REUSE</button>
      </div>
      <div id="identity-line" class="note-line"></div>
    </section>

    <section id="lobby-screen" class="radar-panel hidden">
      <div class="panel-header"><span class="panel-title">LOBBY</span></div>
      <div class="control-row row-wrap">
        <input id="create-grid-size" type="number" min="5" max="15" value="10" />
        <input id="create-max-players" type="number" min="2" max="8" value="3" />
        <button id="create-game-btn" class="btn-radar">CREATE GAME</button>
        <button id="refresh-lobby-btn" class="btn-radar">REFRESH</button>
      </div>
      <div id="games-list" class="list-box"></div>
    </section>

    <section id="game-screen" class="hidden">
      <div class="game-layout">
        <section class="radar-panel">
          <div class="panel-header"><span class="panel-title">YOUR FLEET</span><span id="game-meta"></span></div>
          <div id="placement-controls">
            <div class="control-row row-wrap">
              <span>Place ship: <strong id="placement-ship-label">1x4</strong></span>
              <button id="orient-h" class="btn-radar active-mini">H</button>
              <button id="orient-v" class="btn-radar">V</button>
              <button id="submit-ships-btn" class="btn-radar">SUBMIT SHIPS</button>
              <button id="clear-ships-btn" class="btn-radar">CLEAR</button>
            </div>
          </div>
          <div id="your-grid" class="radar-grid"></div>
        </section>

        <section class="radar-panel">
          <div class="panel-header"><span class="panel-title">OPPONENT SECTORS</span><span id="turn-indicator"></span></div>
          <div id="opponent-grids" class="opponent-grids"></div>
        </section>
      </div>

      <div class="game-layout lower">
        <section class="radar-panel">
          <div class="panel-header"><span class="panel-title">PLAYER STATS</span></div>
          <div id="stats-panel" class="stats-grid"></div>
        </section>
        <section class="radar-panel">
          <div class="panel-header"><span class="panel-title">MOVE HISTORY</span></div>
          <div id="moves-log" class="list-box"></div>
        </section>
      </div>

      <div class="control-row row-wrap">
        <button id="back-to-lobby-btn" class="btn-radar">BACK TO LOBBY</button>
      </div>
    </section>
  </main>

  <div id="hit-explosion" class="explosion" aria-hidden="true"></div>
  <script src="game.js"></script>
</body>
</html>
